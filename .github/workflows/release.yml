name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails build -ldflags "-X main.version=$VERSION -X main.buildDate=$(date -u +%Y-%m-%d)" -platform darwin/arm64

      - name: Package
        run: |
          cd build/bin
          zip -r moviedl-macos.zip moviedl.app

      - uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: build/bin/moviedl-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails build -ldflags "-X main.version=$VERSION -X main.buildDate=$(date -u +%Y-%m-%d)" -platform windows/amd64

      - name: Package
        run: Compress-Archive -Path build\bin\moviedl.exe -DestinationPath build\bin\moviedl-windows.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: build\bin\moviedl-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      # サードパーティアクションはサプライチェーン保護のため commit SHA でピンする
      # （contents: write 権限を持つため）。タグ更新時は SHA も併せて見直す。
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            artifacts/macos-build/moviedl-macos.zip
            artifacts/windows-build/moviedl-windows.zip
          generate_release_notes: true
