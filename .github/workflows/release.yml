name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails build -platform darwin/arm64

      - name: Package
        run: |
          cd build/bin
          zip -r moviedl-macos.zip moviedl.app

      - uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: build/bin/moviedl-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        shell: bash
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails build -platform windows/amd64

      - name: Package
        run: Compress-Archive -Path build\bin\moviedl.exe -DestinationPath build\bin\moviedl-windows.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: build\bin\moviedl-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-build/moviedl-macos.zip
            artifacts/windows-build/moviedl-windows.zip
          generate_release_notes: true
