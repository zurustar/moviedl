name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails build -ldflags "-X main.version=$VERSION -X main.buildDate=$(date -u +%Y-%m-%d)" -platform darwin/arm64

      - name: Package
        run: |
          cd build/bin
          zip -r moviedl-macos.zip moviedl.app

      - uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: build/bin/moviedl-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails build -ldflags "-X main.version=$VERSION -X main.buildDate=$(date -u +%Y-%m-%d)" -platform windows/amd64

      - name: Package
        run: Compress-Archive -Path build\bin\moviedl.exe -DestinationPath build\bin\moviedl-windows.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: build\bin\moviedl-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      # GitHub Release は gh CLI で作成する（第三者アクションを使わず、Node ランタイム
      # 非推奨の影響を受けない）。release ジョブは checkout しないため --repo を明示する。
      # タグ名はシェル展開の安全のため env 経由で渡す。
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            artifacts/macos-build/moviedl-macos.zip \
            artifacts/windows-build/moviedl-windows.zip
